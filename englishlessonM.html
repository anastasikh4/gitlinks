<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Урок английского</title>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: #262626;
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            max-width: 550px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .lesson-image {
            max-width: 100%;
            height: auto;
            margin-bottom: 30px;
            border-radius: 16px;
        }
        .button-image {
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            display: inline-block;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(55,118,246,0.3);
            transform: scale(0.75);
        }
        .button-image:hover {
            transform: scale(0.77);
            opacity: 0.9;
        }
        .button-image:active {
            transform: scale(0.73);
        }
        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="card">
        <img class="lesson-image" src="https://github.com/anastasikh4/gitlinks/blob/main/%D0%A1%D0%BD%D0%B8%D0%BC%D0%BE%D0%BA%20%D1%8D%D0%BA%D1%80%D0%B0%D0%BD%D0%B0%202026-04-05%20185545.png?raw=true" alt="Урок английского">

        <a href="https://telemost.yandex.ru/j/90112271761592" target="_blank">
            <img class="button-image" src="https://github.com/anastasikh4/gitlinks/blob/main/%D0%A1%D0%BD%D0%B8%D0%BC%D0%BE%D0%BA%20%D1%8D%D0%BA%D1%80%D0%B0%D0%BD%D0%B0%202026-04-05%20185918.png?raw=true" alt="ПУСК">
        </a>

        <div class="footer">
            Яндекс Телемост • Ссылка активна
        </div>
    </div>
</body>
</html>
