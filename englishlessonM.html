
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Яндекс Телемост — Вход на урок</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background-color: #262626;
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            max-width: 400px;
            width: 85%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo {
            background-color: #3776f6;
            width: 64px;
            height: 64px;
            border-radius: 16px;
            margin: 0 auto 24px;
            font-size: 32px;
            font-weight: bold;
            line-height: 64px;
            color: white;
        }
        h1 {
            color: white;
            font-size: 22px;
            margin-bottom: 12px;
        }
        p {
            color: #999;
            font-size: 15px;
            margin-bottom: 32px;
        }
        a.button {
            background-color: #3776f6;
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 18px;
            border-radius: 14px;
            display: block;
            font-size: 18px;
        }
        a.button:hover {
            background-color: #2159d1;
        }
        .footer {
            margin-top: 24px;
            font-size: 13px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Y</div>
        <h1>Урок английского</h1>
        <p>Преподаватель приглашает вас<br>присоединиться к видеовстрече.</p>
        <a class="button" href="https://telemost.yandex.ru/j/90112271761592">Подключиться к уроку</a>

    </div>
</body>
</html>
