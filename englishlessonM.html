<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Урок английского</title>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: #262626;
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            max-width: 400px;
        }
        .button {
            background: #3776f6;
            color: white;
            text-decoration: none;
            padding: 18px 32px;
            border-radius: 14px;
            display: inline-block;
            font-weight: bold;
            font-size: 18px;
        }
        .button:hover {
            background: #2159d1;
        }
        h1 { color: white; }
        p { color: #999; }
    </style>
</head>
<body>
    <div class="card">
        <h1>УРОК АНГЛИЙСКОГО</h1>
        <p>НАЖМИ НА КНОПКУ</p>
        <a class="button" href="https://telemost.yandex.ru/j/90112271761592">ПЕРЕЙТИ К УРОКУ</a>
    </div>
</body>
</html>
