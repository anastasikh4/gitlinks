<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>УРОК АНГЛИЙСКОГО</title>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: #262626;
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            max-width: 450px;
            width: 85%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo {
            background: #3776f6;
            width: 64px;
            height: 64px;
            border-radius: 16px;
            margin: 0 auto 24px;
            font-size: 36px;
            font-weight: bold;
            line-height: 64px;
            color: white;
        }
        h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 12px;
        }
        .description {
            color: #aaa;
            font-size: 18px;
            margin-bottom: 32px;
        }
        .button {
            background: #3776f6;
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 14px;
            display: block;
            font-weight: bold;
            font-size: 20px;
            transition: background 0.2s;
        }
        .button:hover {
            background: #2159d1;
        }
        .footer {
            margin-top: 24px;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🇷🇺</div>
        <h1>УРОК АНГЛИЙСКОГО</h1>
        <div class="description">
            НАЖМИ НА СИНЮЮ КНОПКУ
        </div>
        <a class="button" href="https://telemost.yandex.ru/j/90112271761592" target="_blank">
            🚀 ПЕРЕЙТИ К УРОКУ 🚀
        </a>
        <div class="footer">
            ✅ ЯНДЕКС ТЕЛЕМОСТ • ССЫЛКА АКТИВНА
        </div>
    </div>
</body>
</html>
