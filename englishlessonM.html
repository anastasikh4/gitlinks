<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YPOK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #262626;
            padding: 48px 32px;
            border-radius: 32px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5);
        }

        .main-title {
            color: white;
            font-size: 64px;
            font-weight: 800;
            letter-spacing: 12px;
            margin-bottom: 16px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .sub {
            color: #aaa;
            font-size: 22px;
            letter-spacing: 6px;
            margin-bottom: 48px;
            font-weight: 500;
            border-top: 1px solid #3a3a3a;
            display: inline-block;
            padding-top: 12px;
        }

        .button {
            background: #3776f6;
            color: white;
            text-decoration: none;
            padding: 18px 24px;
            border-radius: 80px;
            display: inline-block;
            font-weight: bold;
            font-size: 24px;
            letter-spacing: 6px;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px rgba(55,118,246,0.3);
            margin-bottom: 48px;
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .button:hover {
            background: #2159d1;
            transform: scale(1.02);
            box-shadow: 0 15px 25px rgba(33,89,209,0.4);
        }

        .button:active {
            transform: scale(0.98);
        }

        .footer {
            color: #555;
            font-size: 18px;
            letter-spacing: 3px;
            font-weight: 400;
            border-top: 1px solid #3a3a3a;
            padding-top: 28px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="main-title">YPOK</div>
        <div class="sub">English</div>

        <a class="button" href="https://telemost.yandex.ru/j/90112271761592" target="_blank">
            K H O P K A ▶️
        </a>

        <div class="footer">yandex</div>
    </div>
</body>
</html>
