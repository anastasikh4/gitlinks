<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- Эта строка отвечает за то, чтобы не было "кракозябр" -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Яндекс Телемост — Вход на урок</title>
    <style>
        :root {
            --yandex-blue: #3776f6;
            --yandex-hover: #2159d1;
            --bg-color: #1a1a1a;
            --card-bg: #262626;
            --text-color: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 85%;
        }

        .logo-circle {
            width: 64px;
            height: 64px;
            background: var(--yandex-blue);
            border-radius: 16px;
            margin: 0 auto 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .description {
            color: #999;
            margin-bottom: 32px;
            font-size: 15px;
            line-height: 1.5;
        }

        .join-btn {
            background-color: var(--yandex-blue);
            color: white;
            border: none;
            padding: 18px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            text-decoration: none;
            display: block;
            width: 100%;
            box-sizing: border-box;
        }

        .join-btn:hover {
            background-color: var(--yandex-hover);
        }

        .join-btn:active {
            transform: scale(0.98);
        }

        .footer {
            margin-top: 24px;
            font-size: 13px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-circle">Y</div>
    <h1>Урок английского</h1>
    <p class="description">
        Преподаватель приглашает вас<br> 
        присоединиться к видеовстрече.
    </p>
    
    <a href="https://telemost.yandex.ru/j/90112271761592" class="join-btn">
        Подключиться к уроку
    </a>
    
    <div class="footer">
        Яндекс Телемост • Ссылка активна
    </div>
</div>

</body>
</html>
